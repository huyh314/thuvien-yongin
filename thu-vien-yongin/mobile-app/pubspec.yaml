name: yongin_reader
description: OPAC Mobile - Thư viện Yongin
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0
  dio: ^5.4.0
  supabase_flutter: ^2.5.0
  go_router: ^14.0.0
  google_fonts: ^6.2.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  flutter_rating_bar: ^4.0.0
  mobile_scanner: ^5.1.0
  qr_flutter: ^4.1.0
  flutter_secure_storage: ^9.2.0
  shared_preferences: ^2.3.0
  firebase_core: ^3.1.0
  firebase_messaging: ^15.0.0
  intl: ^0.19.0
  url_launcher: ^6.3.0
  flutter_svg: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
